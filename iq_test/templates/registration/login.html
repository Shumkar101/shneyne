<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход | IQMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f4f6f9; color: #0f172a; }</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-[2rem] p-8 shadow-2xl border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold mb-2">С возвращением!</h2>
            <p class="text-gray-500">Войди, чтобы посмотреть свои результаты</p>
        </div>
        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div class="space-y-4 [&>p>input]:w-full [&>p>input]:px-4 [&>p>input]:py-3 [&>p>input]:rounded-xl [&>p>input]:border [&>p>input]:bg-gray-50 [&>p>input]:outline-none [&>p>label]:block [&>p>label]:mb-1 [&>p>label]:text-sm [&>p>label]:font-medium">
                {{ form.as_p }}
            </div>
            <button type="submit" class="w-full py-4 bg-[#0f172a] text-white rounded-xl font-medium hover:scale-[1.02] transition-transform">Войти</button>
        </form>
        <p class="text-center mt-6 text-sm text-gray-500">
            Нет аккаунта? <a href="{% url 'register' %}" class="text-[#0ea5e9] font-medium hover:underline">Создать сейчас</a>
        </p>
        <p class="text-center mt-2 text-sm"><a href="/" class="text-gray-400 hover:text-gray-700">На главную</a></p>
    </div>
</body>
</html>
